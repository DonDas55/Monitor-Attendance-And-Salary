<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Salary + Attendance + FY Bonus</title>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <h1>Salary + Attendance + FY Bonus</h1>
  <div class="worker-card">

        <h3>Select Worker</h3>

        <select id="workerSelect">
            <option value="1">PINAKI KHAN</option>
            <option value="2">SOUVIK DAS</option>
            <option value="3">SOUMAN PANDA</option>
            <option value="4">PINTU BHATTACHARYA</option>
            <option value="5">ANIMESH MAITY</option>
            <option value="6">SK MURSALIM ALI</option>
            <option value="7">SUSOVAN PAL</option>
        </select>

        <button onclick="logout()">Logout</button>

    </div><br>

  <div class="container">

    <!-- SALARY -->
    <div class="card">
      <div class="field"><label>Festival Days</label><input id="festivalDays" type="number"></div>
      <div class="field"><label>Festival Rate</label><input id="festivalRate" type="number" value="437"></div>

      <div class="field"><label>Working Days</label><input id="workDays" type="number"></div>
      <div class="field"><label>Daily Rate</label><input id="workRate" type="number" value="437"></div>

      <div class="field"><label>OT Hours</label><input id="otHours" type="number"></div>
      <div class="field"><label>OT Rate</label><input id="otRate" type="number" value="109.25"></div>

      <div class="field"><label>Tax (Fixed)</label><input id="taxFixed" type="number" value="110"></div>

      <div class="result">
        <div class="line"><span class="muted">Basic</span><span id="basic" class="big">₹0</span></div>
        <div class="line"><span class="muted">HRA</span><span id="hra" class="big">₹0</span></div>
        <div class="line"><span class="muted">Festival</span><span id="festival" class="big">₹0</span></div>
        <div class="line"><span class="muted">Overtime</span><span id="overtime" class="big">₹0</span></div>
        <div class="line"><span class="muted">Gross</span><span id="gross" class="big">₹0</span></div>
        <div class="line"><span class="muted">EPFO</span><span id="epfo" class="big">₹0</span></div>
        <div class="line"><span class="muted">ESIC</span><span id="esic" class="big">₹0</span></div>
        <div class="line"><span class="muted">Net</span><span id="net" class="big">₹0</span></div>
        <div class="line"><span class="muted">FY Bonus (8.33%)</span><span id="bonus" class="big">₹0</span></div>
      </div>
    </div>

    <!-- CALENDAR -->
    <div class="card">
      <div class="attendance-count">Total Attended: <span id="attendedCount">0</span></div>

      <div class="calendar">
        <div class="calendar-header">
          <button id="prevMonth">&lt;</button>
          <h3 id="monthYear"></h3>
          <button id="nextMonth">&gt;</button>
        </div>

        <div class="calendar-days">
          <div>Sun</div>
          <div>Mon</div>
          <div>Tue</div>
          <div>Wed</div>
          <div>Thu</div>
          <div>Fri</div>
          <div>Sat</div>
        </div>

        <div class="calendar-dates" id="calendarDates"></div>

        <div style="margin-top:10px">
          <input type="date" id="holidayInput" class="line">
          <button onclick="addHoliday()" style="margin-top:12px;width:100%">Add Holiday</button>
        </div>
      </div>
    </div>

  </div>

  <button onclick="downloadSalaryPDF()" style="margin-top:12px;width:100%">
    ⬇️ Download Salary Slip PDF
  </button>


  <button onclick="downloadAllWorkersPDF()" style="margin-top:12px;width:100%">
    📄 Download 7 Worker Salary Report
  </button>
 
  <!--<button onclick="clearAllData()" style="margin-top:12px;width:100%">🗑 Clear All Data</button>-->

  <!-- JS -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<script src="script new.js"></script>
</body>

</html>
