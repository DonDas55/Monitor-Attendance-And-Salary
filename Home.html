<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Salary & Attendance & FY Bonus</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <div class="worker-card">
    <h3>Select Worker</h3>
    <select id="workerSelect">
      <option value="1">PINAKI KHANI</option>
      <option value="2">SOUVIK DAS</option>
      <option value="3">SOUMAN PANDA</option>
      <option value="4">PINTU BHATTACHARYA</option>
      <option value="5">ANIMESH MAITY</option>
      <option value="6">SK MURSALIM ALI</option>
      <option value="7">SUSOVAN PAL</option>
    </select>

    <div class="button-group">
      <button id="saveToSheetBtn" class="btn-sheet">Save to Sheet</button>
    </div>
  </div>

  <div class="container">
    <div class="card">
      <div class="field"><label for="festivalDays">Festival Days</label><input id="festivalDays" type="number"></div>
      <div class="field"><label for="festivalRate">Festival Rate</label><input id="festivalRate" type="number"
          value="437"></div>
      <div class="field"><label for="workDays">Working Days</label><input id="workDays" type="number"></div>
      <div class="field"><label for="workRate">Daily Rate</label><input id="workRate" type="number" value="437"></div>
      <div class="field"><label for="otHours">OT Hours</label><input id="otHours" type="number"></div>
      <div class="field"><label for="otRate">OT Rate</label><input id="otRate" type="number" value="109.25"></div>
      <div class="field"><label for="taxFixed">Tax</label><input id="taxFixed" type="number" value="0"></div>

      <div class="result">
        <div class="line"><span class="muted">Basic</span><span id="basic" class="big">₹0</span></div>
        <div class="line"><span class="muted">HRA</span><span id="hra" class="big">₹0</span></div>
        <div class="line"><span class="muted">Festival</span><span id="festival" class="big">₹0</span></div>
        <div class="line"><span class="muted">Overtime</span><span id="overtime" class="big">₹0</span></div>
        <div class="line"><span class="muted">Gross</span><span id="gross" class="big">₹0</span></div>
        <div class="line"><span class="muted">EPFO</span><span id="epfo" class="big">₹0</span></div>
        <div class="line"><span class="muted">ESIC</span><span id="esic" class="big">₹0</span></div>
        <div class="line"><span class="muted">Net</span><span id="net" class="big">₹0</span></div>
        <div class="line"><span class="muted">FY Bonus (8.33%)</span><span id="bonus" class="big">₹0</span></div>
      </div>
    </div>

    <div class="card">
      <div class="attendance-count">Total Attended: <span id="attendedCount">0</span></div>
      <div class="calendar">
        <div class="calendar-header">
          <button id="prevMonth">&lt;</button>
          <h3 id="monthYear"></h3>
          <button id="nextMonth">&gt;</button>
        </div>
        <div class="calendar-days">
          <div>Sun</div>
          <div>Mon</div>
          <div>Tue</div>
          <div>Wed</div>
          <div>Thu</div>
          <div>Fri</div>
          <div>Sat</div>
        </div>
        <div class="calendar-dates" id="calendarDates"></div><br><br>
<div class="pdf-buttons">
  <button id="downloadPdfBtn" class="btn-sheet" onclick="downloadSalaryPDF()">Download PDF</button>
  <button id="downloadAllPdfBtn" class="btn-sheet" onclick="downloadAllWorkersPDF()">Download All PDF</button>
</div>

        <div id="statusMessage" class="toast-popup"></div>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="apu.js"></script>
</body>

</html>
